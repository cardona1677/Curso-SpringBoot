<!DOCTYPE html>
<html lang="en" xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag Racing</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <h1>Lista de Competidores</h1>
    <ul>
        <li><strong>Marca:</strong> <span th:text="${Carro.marca}"></span></li>
        <li><strong>Modelo:</strong> <span th:text="${Carro.modelo}"></span></li>
        <li><strong>Año:</strong> <span th:text="${Carro.año}"></span></li>
        <li><strong>Apodo:</strong> <span th:text="${Carro.apodo != null ? Carro.apodo : 'No tiene'}"></span></li>
    </ul>

    <table>
        <thead>
            <tr>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Año</th>
                <th>Apodo</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="carro : ${carros}">
                <td th:text="${carro.marca}"></td>
                <td th:text="${carro.modelo}"></td>
                <td th:text="${carro.año}"></td>
                <td th:text="${carro.apodo != null ? carro.apodo : 'No tiene'}"></td>
            </tr>
        </tbody>
    </table>

    
</body>
</html>
